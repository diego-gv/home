# Project information
site_name: Diego S. García
site_description: Senior Backend Developer + Python/Django
site_url: https://diego-gv.github.io/site/

# Configuration
theme:
  variant: classic
  name: material
  custom_dir: docs/overrides
  language: es
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference

# Additional configuration
extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/diegosalvadorgv/
    - icon: fontawesome/brands/github
      link: https://github.com/diego-gv

# Extensions
markdown_extensions:
  # - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

# Page tree
nav:
  - Home: index.md
  - Proyectos:
      - projects/index.md
      - Pendiente: projects/pending.md
